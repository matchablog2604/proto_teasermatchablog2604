<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchablog Launch</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;family=Dancing+Script:wght@700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --matcha: #c5d8a4;
      --matcha-dark: #8fa371;
      --gold: #e8d4a8;
      --gold-dark: #c9a876;
      --text-dark: #2a3a2a;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* ===== BACKGROUND & STARFIELD ===== */
    .bg-hero {
      background: linear-gradient(180deg, #0f1410 0%, #0a0e0c 50%, #050807 100%);
      position: relative;
    }

    .starfield {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .star.active {
      animation: twinkle var(--duration) ease-in-out infinite;
    }

    /* Laser beams effect */
    .laser-beam {
      position: absolute;
      pointer-events: none;
      opacity: 0;
    }

    .laser-1 {
      width: 2px;
      height: 400px;
      background: linear-gradient(180deg, transparent, rgba(101, 218, 142, 0.6), transparent);
      top: 50%;
      left: 20%;
      transform: translateY(-50%) rotate(-15deg);
    }

    .laser-2 {
      width: 2px;
      height: 400px;
      background: linear-gradient(180deg, transparent, rgba(232, 212, 168, 0.5), transparent);
      top: 50%;
      right: 25%;
      transform: translateY(-50%) rotate(15deg);
    }

    .laser-3 {
      width: 2px;
      height: 350px;
      background: linear-gradient(180deg, transparent, rgba(101, 218, 142, 0.4), transparent);
      top: 50%;
      left: 50%;
      transform: translateX(-50%) translateY(-50%) rotate(25deg);
    }

    @keyframes laserBurst {
      0% { opacity: 0; }
      10% { opacity: 1; }
      50% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .laser-beam.active {
      animation: laserBurst 2s ease-out forwards;
    }

    /* ===== ENVELOPE ===== */
    .envelope-container {
      perspective: 1000px;
      z-index: 10;
    }

    .envelope {
      width: 320px;
      height: 220px;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      animation: floatEnvelope 3s ease-in-out infinite;
    }

    @keyframes floatEnvelope {
      0%, 100% { transform: translateY(0) rotateX(5deg); }
      50% { transform: translateY(-15px) rotateX(5deg); }
    }

    .envelope-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #f8f4e8 0%, #e8e0d0 100%);
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.5);
      position: relative;
      overflow: hidden;
    }

    .envelope-body::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      opacity: 0.4;
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 110px;
      background: linear-gradient(180deg, #e8e0d0 0%, #f8f4e8 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top center;
      transform: rotateX(0deg);
      z-index: 10;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    @keyframes flapOpen {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-180deg); }
    }

    .envelope-inner {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      background: linear-gradient(0deg, #f0e8d8 0%, #e8e0d0 100%);
      clip-path: polygon(0 100%, 50% 20%, 100% 100%);
    }

    /* Wax seal 'M' logo */
    .wax-seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #d4af37 0%, #e8d4a8 50%, #c9a876 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 15;
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5), inset 0 2px 5px rgba(255, 255, 255, 0.3);
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: #8b6914;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    }

    .wax-seal::before {
      content: '';
      position: absolute;
      inset: -3px;
      border: 2px solid rgba(232, 212, 168, 0.4);
      border-radius: 50%;
      animation: sealGlow 2s ease-in-out infinite;
    }

    @keyframes sealGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(232, 212, 168, 0.3); }
      50% { box-shadow: 0 0 30px rgba(232, 212, 168, 0.6); }
    }

    .click-prompt {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
      animation: promptPulse 2s ease-in-out infinite;
    }

    @keyframes promptPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-5px); }
    }

    .envelope.opening {
      animation: envelopeFade 0.5s 1.2s forwards;
    }

    @keyframes envelopeFade {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(50px) scale(0.8); }
    }

    .envelope.opening .envelope-flap {
      animation: flapOpen 0.8s 0.4s forwards;
    }

    /* Inner envelope glow */
    .envelope-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(232, 212, 168, 0.5), transparent);
      opacity: 0;
      animation: innerGlow 0.8s 0.4s forwards;
    }

    @keyframes innerGlow {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ===== TEASER SEQUENCE ===== */
    .teaser-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      pointer-events: none;
    }

    .teaser-element {
      position: absolute;
      text-align: center;
      opacity: 0;
    }

    .teaser-theme {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 700;
      color: var(--matcha);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(197, 216, 164, 0.5);
    }

    .teaser-volume {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 80px;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(232, 212, 168, 0.6);
    }

    .teaser-title {
      font-family: 'Playfair Display', serif;
      font-size: 68px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 60px rgba(232, 212, 168, 0.8);
    }

    @keyframes teaserZoom {
      0% { transform: scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: scale(1.1); opacity: 0; }
    }

    .teaser-element.active {
      animation: teaserZoom 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ===== FLASH OVERLAY ===== */
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes flashBurst {
      0% { opacity: 0; }
      50% { opacity: 0.9; }
      100% { opacity: 0; }
    }

    .flash-overlay.active {
      animation: flashBurst 0.2s ease-out forwards;
    }

    /* ===== CONFETTI & PARTICLES - MASSIVE DENSITY ===== */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 45;
    }

    .ribbon {
      position: fixed;
      width: 20px;
      height: 4px;
      pointer-events: none;
      z-index: 44;
    }

    .glow-particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 44;
    }

    .sparkle-burst {
      position: fixed;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 46;
      box-shadow: 0 0 4px var(--gold);
    }

    /* ===== LETTER CARD ===== */
    .letter-card {
      width: 360px;
      height: 560px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 120%) scale(0.4) rotateX(60deg);
      opacity: 0;
      z-index: 60;
      border-radius: 24px;
      background: linear-gradient(165deg, #e8f0dc 0%, #dae8cc 50%, #cfe5bb 100%);
      box-shadow: 0 0 0 1px rgba(143, 163, 113, 0.3), 0 40px 100px rgba(42, 58, 42, 0.3), 0 15px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      perspective: 1000px;
      transition: none;
      will-change: transform, opacity;
    }

    /* Radiant glow backdrop */
    .card-glow-backdrop {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse at 50% 50%, rgba(197, 216, 164, 0.4) 0%, rgba(232, 212, 168, 0.2) 30%, transparent 70%);
      border-radius: 50%;
      z-index: 55;
      pointer-events: none;
      opacity: 0;
      filter: blur(40px);
    }

    .card-glow-backdrop.revealed {
      animation: glowRadiate 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    }

    @keyframes glowRadiate {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0.7;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    /* Falling stars effect */
    .falling-star {
      position: fixed;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 58;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
    }

    .letter-card.revealed {
      animation: cardWalkup 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    }

    @keyframes cardWalkup {
      0% { 
        transform: translate(-50%, 120%) scale(0.4) rotateX(60deg) rotateZ(0deg);
        opacity: 0;
      }
      50% {
        transform: translate(-50%, -40%) scale(1.15) rotateX(10deg) rotateZ(2deg);
        opacity: 1;
      }
      75% {
        transform: translate(-50%, -55%) scale(1.08) rotateX(-5deg) rotateZ(-1deg);
        opacity: 1;
      }
      100% { 
        transform: translate(-50%, -50%) scale(1) rotateX(0deg) rotateZ(0deg);
        opacity: 1;
      }
    }

    @keyframes screenShake {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      25% { transform: translate(-50%, -50%) scale(1) translateX(-2px) translateY(-2px); }
      50% { transform: translate(-50%, -50%) scale(1) translateX(2px) translateY(2px); }
      75% { transform: translate(-50%, -50%) scale(1) translateX(-1px) translateY(1px); }
    }

    .letter-card.revealed.impact {
      animation: screenShake 0.4s ease-out;
    }

    /* Card inner glow */
    .letter-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(232, 212, 168, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Card inner structure - flexbox */
    .card-inner {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      padding: 28px;
      position: relative;
      z-index: 2;
    }

    /* Header row */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      margin-bottom: 12px;
    }

    .version-badge {
      text-align: left;
    }

    .version-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 10px;
      background: linear-gradient(135deg, #65da8e 0%, #4ade80 100%);
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      color: white;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: livePulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 8px #22c55e;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    .date-stamp {
      text-align: right;
    }

    .stamp-frame {
      padding: 8px 12px;
      border: 2px solid var(--text-dark);
      border-radius: 4px;
      background: rgba(42, 58, 42, 0.05);
      transform: rotate(3deg);
    }

    .stamp-text {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Hero section */
    .hero-section {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(42, 58, 42, 0.1), 6px 6px 0 rgba(42, 58, 42, 0.05);
    }

    .hero-subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--matcha-dark);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* Shine effect */
    .card-shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: skewX(-20deg);
      pointer-events: none;
    }

    .letter-card:hover .card-shine {
      animation: shine 0.8s forwards;
    }

    @keyframes shine {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    /* Bottom glass section */
    .bottom-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .welcome-text {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
      text-align: center;
      margin: 0;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(42, 58, 42, 0.3), transparent);
    }

    /* Features grid */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .feature-item {
      text-align: center;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .feature-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* CTA Button - Elegant Ghost */
    .cta-button {
      display: inline-block;
      margin-top: 8px;
      margin-bottom: 0;
      padding: 12px 28px;
      background: transparent;
      color: var(--matcha-dark);
      border: 2px solid var(--matcha-dark);
      border-radius: 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(143, 163, 113, 0.1);
    }

    .cta-button:hover {
      color: white;
      background: var(--matcha-dark);
      border-color: var(--matcha-dark);
      box-shadow: 0 0 20px rgba(143, 163, 113, 0.4);
    }

    .cta-button:active {
      transform: scale(0.95);
    }

    /* Signature */
    .signature {
      font-family: 'Dancing Script', cursive;
      font-size: 28px;
      color: var(--text-dark);
      text-align: right;
      margin-top: 4px;
      opacity: 0.8;
    }

    /* Sparkles */
    .sparkle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 55;
    }

    .letter-card.revealed .sparkle {
      animation: sparkle 2s ease-out forwards;
    }

    @keyframes sparkle {
      0% { transform: scale(0); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: scale(1) translateY(-150px); opacity: 0; }
    }

    @keyframes shimmerFall {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(800px) translateX(var(--drift, 0px)) scale(0);
        opacity: 0;
      }
    }

    .falling-star.active {
      animation: shimmerFall 2.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* Spotlight effect */
    .spotlight {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      pointer-events: none;
      z-index: 57;
      opacity: 0;
      filter: blur(60px);
    }

    .spotlight-beam {
      position: absolute;
      inset: 0;
      background: conic-gradient(
        from 0deg,
        rgba(232, 212, 168, 0) 0deg,
        rgba(232, 212, 168, 0.3) 15deg,
        rgba(197, 216, 164, 0.2) 30deg,
        rgba(232, 212, 168, 0) 60deg
      );
      border-radius: 50%;
    }

    @keyframes spotlightFlare {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0.4;
        transform: translate(-50%, -50%) scale(1.3);
      }
    }

    .spotlight.active {
      animation: spotlightFlare 3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

 </head>

   </div><!-- Teaser sequence -->

     </div>
    </div>
    <div class="teaser-element" id="teaser-volume">
     <div class="teaser-volume">
      VOLUME 1
     </div>
    </div>
    <div class="teaser-element" id="teaser-title">
     <div class="teaser-title" id="teaser-title-text">
      A JOURNEY OF GENTLE EMOTIONS AND THE THINGS WE LEARN IN SILENCES
     </div>
    </div>
   </div><!-- Flash overlay -->
   <div class="flash-overlay" id="flash-overlay"></div><!-- Letter Card -->
   <div class="letter-card" id="letter-card">
    <div class="card-shine"></div><!-- Sparkles -->
    <div class="sparkle" style="top: 20%; left: 10%; animation-delay: 1.4s;"></div>
    <div class="sparkle" style="top: 30%; left: 90%; animation-delay: 1.6s;"></div>
    <div class="sparkle" style="top: 60%; left: 15%; animation-delay: 1.8s;"></div>
    <div class="sparkle" style="top: 50%; left: 85%; animation-delay: 1.5s;"></div>
    <div class="sparkle" style="top: 70%; left: 50%; animation-delay: 1.7s;"></div><!-- Card inner content -->
    <div class="card-inner">
     <!-- Header -->
     <div class="card-header">
      <div class="version-badge">
       <div class="version-number">
        V 1.0
       </div>
       <div class="live-badge"><span class="live-dot"></span> <span>LIVE</span>
       </div>
      </div>
      <div class="date-stamp">
       <div class="stamp-frame">
        <div class="stamp-text">
         March 2026
        </div>
       </div>
      </div>
     </div><!-- Hero -->
     <div class="hero-section">
      <h1 class="hero-title" id="hero-title" data-text="Matchablog">Matchablog</h1>
      <p class="hero-subtitle">Est. 2026</p>
     </div><!-- Bottom glass section -->
     <div class="bottom-section">
      <h2 class="welcome-text" id="welcome-text">Welcome to My Digital Space</h2>
      <div class="divider"></div>
      <div class="features-grid">
       <div class="feature-item">
        <div class="feature-icon">
         📰
        </div>
        <div class="feature-label">
         Articles
        </div>
       </div>
       <div class="feature-item">
        <div class="feature-icon">
         🎨
        </div>
        <div class="feature-label">
         Visuals
        </div>
       </div>
      </div><a href="#" class="cta-button" id="cta-button">ENTER MATCHABLOG</a>
      <div class="signature" id="signature">
       Alif
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      theme_text: 'THE DIGITAL ERA',
      site_name: 'Matchablog',
      welcome_text: 'Welcome to My Digital Space',
      volume_title: 'GENESIS',
      signature_name: 'Alif',
      cta_button_text: 'ENTER MATCHABLOG'
    };

    let isOpened = false;
    let currentConfig = { ...defaultConfig };

    // Initialize starfield on page load
    function initStarfield() {
      const starfield = document.getElementById('starfield');
      const starCount = 80;

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
        star.classList.add('active');
        starfield.appendChild(star);
      }
    }

    // Teaser sequence - STAGGERED timing after envelope fully opens
    async function runTeaserSequence() {
      const teaserContainer = document.getElementById('teaser-container');
      teaserContainer.style.display = 'flex';

      const teaser1 = document.getElementById('teaser-theme');
      const teaser2 = document.getElementById('teaser-volume');
      const teaser3 = document.getElementById('teaser-title');

      // Step 1: Theme text appears after 200ms delay (1.5 seconds duration)
      await new Promise(resolve => setTimeout(resolve, 200));
      await showTeaserElement(teaser1, 1500);

      // Step 2: VOL. 1 appears after 150ms delay (1.5 seconds duration)
      await new Promise(resolve => setTimeout(resolve, 150));
      await showTeaserElement(teaser2, 1500);

      // Step 3: Title appears after 150ms delay (1.5 seconds duration)
      await new Promise(resolve => setTimeout(resolve, 150));
      await showTeaserElement(teaser3, 1500);

      // At ~4.8s, activate explosion
    }

    function showTeaserElement(element, duration) {
      return new Promise(resolve => {
        element.classList.add('active');
        setTimeout(() => {
          element.classList.remove('active');
          resolve();
        }, duration);
      });
    }

    // Explosion with flash + confetti + ribbons + massive particles
    function triggerExplosion() {
      const flash = document.getElementById('flash-overlay');
      
      // Flash burst
      flash.classList.add('active');
      
      // Activate lasers
      document.getElementById('laser-1').classList.add('active');
      document.getElementById('laser-2').classList.add('active');
      document.getElementById('laser-3').classList.add('active');

      // Create MASSIVE confetti
      createMassiveConfetti();
      
      // Create ribbons
      createRibbons();
      
      // Create glow particles
      createGlowParticles();
      
      // Create sparkle burst
      createSparkleBurst();
    }

    // Create INSANELY dense confetti
    function createMassiveConfetti() {
      const app = document.getElementById('app');
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const colors = ['#e8d4a8', '#c9a876', '#c5d8a4', '#8fa371', '#ffffff'];

      for (let i = 0; i < 120; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = centerX + 'px';
        confetti.style.top = centerY + 'px';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0px';
        app.appendChild(confetti);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 250 + Math.random() * 450;
        const destX = Math.cos(angle) * velocity;
        const destY = Math.sin(angle) * velocity - 350;
        const rotation = Math.random() * 720;

        confetti.animate([
          { transform: 'translate(0, 0) rotate(0deg) scale(1)', opacity: 1 },
          { transform: `translate(${destX * 0.5}px, ${destY * 0.3}px) rotate(${rotation * 0.5}deg) scale(0.8)`, opacity: 1 },
          { transform: `translate(${destX}px, ${destY}px) rotate(${rotation}deg) scale(0)`, opacity: 0 }
        ], {
          duration: 2500 + Math.random() * 1200,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });

        setTimeout(() => confetti.remove(), 3700);
      }
    }

    // Create metallic ribbons
    function createRibbons() {
      const app = document.getElementById('app');
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const colors = ['#e8d4a8', '#c9a876', '#c5d8a4'];

      for (let i = 0; i < 30; i++) {
        const ribbon = document.createElement('div');
        ribbon.className = 'ribbon';
        ribbon.style.background = colors[Math.floor(Math.random() * colors.length)];
        ribbon.style.left = centerX + 'px';
        ribbon.style.top = centerY + 'px';
        ribbon.style.borderRadius = '2px';
        app.appendChild(ribbon);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 200 + Math.random() * 400;
        const destX = Math.cos(angle) * velocity;
        const destY = Math.sin(angle) * velocity - 300;
        const rotation = Math.random() * 1080;

        ribbon.animate([
          { transform: 'translate(0, 0) rotate(0deg) scaleY(1)', opacity: 1 },
          { transform: `translate(${destX}px, ${destY}px) rotate(${rotation}deg) scaleY(0.3)`, opacity: 0 }
        ], {
          duration: 2200 + Math.random() * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });

        setTimeout(() => ribbon.remove(), 3200);
      }
    }

    // Create glow particles
    function createGlowParticles() {
      const app = document.getElementById('app');
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const colors = ['#65da8e', '#e8d4a8', '#c5d8a4'];

      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'glow-particle';
        particle.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]}, transparent)`;
        particle.style.width = (30 + Math.random() * 60) + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        particle.style.boxShadow = `0 0 ${15 + Math.random() * 30}px ${colors[Math.floor(Math.random() * colors.length)]}`;
        app.appendChild(particle);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 180 + Math.random() * 350;
        const destX = Math.cos(angle) * velocity;
        const destY = Math.sin(angle) * velocity - 250;

        particle.animate([
          { transform: 'translate(0, 0) scale(1)', opacity: 1 },
          { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
        ], {
          duration: 2000 + Math.random() * 800,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });

        setTimeout(() => particle.remove(), 2800);
      }
    }

    // Create sparkle burst (extra dense)
    function createSparkleBurst() {
      const app = document.getElementById('app');
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      for (let i = 0; i < 80; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle-burst';
        sparkle.style.left = centerX + 'px';
        sparkle.style.top = centerY + 'px';
        app.appendChild(sparkle);

        const angle = Math.random() * Math.PI * 2;
        const velocity = 150 + Math.random() * 400;
        const destX = Math.cos(angle) * velocity;
        const destY = Math.sin(angle) * velocity - 200;

        sparkle.animate([
          { transform: 'translate(0, 0) scale(1)', opacity: 1 },
          { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
        ], {
          duration: 1500 + Math.random() * 800,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });

        setTimeout(() => sparkle.remove(), 2300);
      }
    }

    // Reveal card with 0.3s delay after explosion
    function revealCard() {
      const card = document.getElementById('letter-card');
      const backdrop = document.getElementById('card-glow-backdrop');
      const spotlight = document.getElementById('spotlight');
      
      card.classList.add('revealed');
      backdrop.classList.add('revealed');
      spotlight.classList.add('active');
      
      // Trigger falling stars during card pop-up
      createFallingStars();
      
      setTimeout(() => {
        card.classList.add('impact');
        setTimeout(() => card.classList.remove('impact'), 400);
      }, 100);
    }

    // Create falling stars effect
    function createFallingStars() {
      const app = document.getElementById('app');
      const starCount = 50;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'falling-star';
        
        // Random starting positions from top
        const startX = Math.random() * window.innerWidth;
        const startY = -50;
        
        star.style.left = startX + 'px';
        star.style.top = startY + 'px';
        
        // Random drift (lateral movement)
        const drift = (Math.random() - 0.5) * 200;
        star.style.setProperty('--drift', drift + 'px');
        
        // Stagger animation starts
        const delay = Math.random() * 0.5;
        star.style.animationDelay = delay + 's';
        
        app.appendChild(star);
        star.classList.add('active');
        
        // Remove after animation
        setTimeout(() => star.remove(), 3300 + (delay * 1000));
      }
    }

    // Open envelope
    function openEnvelope() {
      if (isOpened) return;
      isOpened = true;

      const envelope = document.getElementById('envelope');
      const prompt = document.querySelector('.click-prompt');

      prompt.style.opacity = '0';
      envelope.classList.add('opening');

      // Hide envelope and start teaser AFTER flap fully opens (800ms)
      setTimeout(() => {
        document.getElementById('envelope-container').classList.add('hidden-element');
        runTeaserSequence();
      }, 800);

      // T = 0.0s: Explosion (at 5.3s total = 800ms envelope open + 4500ms teaser)
      setTimeout(() => {
        triggerExplosion();
      }, 5300);

      // T = 0.3s: Card walkup (at 5.6s total)
      setTimeout(() => {
        document.getElementById('teaser-container').style.display = 'none';
        revealCard();
        addTiltEffect();
      }, 5600);
    }

    // 3D tilt on hover
    function addTiltEffect() {
      const card = document.getElementById('letter-card');
      const app = document.getElementById('app');

      app.addEventListener('mousemove', (e) => {
        if (!isOpened) return;
        
        const rect = card.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const rotateX = (e.clientY - centerY) / 25;
        const rotateY = (centerX - e.clientX) / 25;

        card.style.setProperty('--rotateX', `${-rotateX}deg`);
        card.style.setProperty('--rotateY', `${rotateY}deg`);
        
        // Apply transform with explicit calculation to avoid blur
        const baseTransform = 'translate(-50%, -50%) scale(1.02)';
        card.style.transform = `${baseTransform} rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
      });

      app.addEventListener('mouseleave', () => {
        card.style.setProperty('--rotateX', '0deg');
        card.style.setProperty('--rotateY', '0deg');
        card.style.transform = 'translate(-50%, -50%) scale(1)';
      });
    }

    // Update UI based on config
    function updateUI(config) {
      const heroTitle = document.getElementById('hero-title');
      const welcomeText = document.getElementById('welcome-text');
      const signature = document.getElementById('signature');
      const teaserTitleText = document.getElementById('teaser-title-text');
      const teaserThemeText = document.getElementById('teaser-theme-text');
      const ctaButton = document.getElementById('cta-button');

      if (heroTitle) {
        const siteName = config.site_name || defaultConfig.site_name;
        heroTitle.textContent = siteName;
        heroTitle.setAttribute('data-text', siteName);
      }
      if (welcomeText) welcomeText.textContent = config.welcome_text || defaultConfig.welcome_text;
      if (signature) signature.textContent = config.signature_name || defaultConfig.signature_name;
      if (teaserTitleText) teaserTitleText.textContent = config.volume_title || defaultConfig.volume_title;
      if (teaserThemeText) teaserThemeText.textContent = config.theme_text || defaultConfig.theme_text;
      if (ctaButton) ctaButton.textContent = config.cta_button_text || defaultConfig.cta_button_text;
    }

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', () => {
      initStarfield();
    });

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          currentConfig = { ...currentConfig, ...config };
          updateUI(currentConfig);
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['theme_text', config.theme_text || defaultConfig.theme_text],
          ['site_name', config.site_name || defaultConfig.site_name],
          ['welcome_text', config.welcome_text || defaultConfig.welcome_text],
          ['volume_title', config.volume_title || defaultConfig.volume_title],
          ['signature_name', config.signature_name || defaultConfig.signature_name],
          ['cta_button_text', config.cta_button_text || defaultConfig.cta_button_text]
        ])
      });
    }
  </script>
